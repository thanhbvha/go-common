syntax = "proto3";

package echo;

option go_package = "github.com/thanhbvha/go-common/examples/grpc_simple/proto";

service EchoService {
    rpc Echo (EchoRequest) returns (EchoResponse) {}
    rpc EchoError (EchoRequest) returns (EchoResponse) {}
    rpc EchoPanic (EchoRequest) returns (EchoResponse) {}
}

message EchoRequest {
    string message = 1;
}

message EchoResponse {
    string message = 1;
}
